name: Deploy Supabase Functions

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
      - ".github/workflows/deploy-functions.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy all edge functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          PROJECT=xpgsipmyrwyjerjvbhmb
          FUNCTIONS=(
            event-router
            process-events
            google-ads-capi
            ga4-events
            gateway-webhook
            gtm-server-events
            mcp
            ml-attribution
            optimization-engine
            predictive-analytics
          )
          for fn in "${FUNCTIONS[@]}"; do
            echo "→ Deploying $fn"
            supabase functions deploy "$fn" --project-ref "$PROJECT"
          done
